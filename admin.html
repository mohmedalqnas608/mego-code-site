<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم ميجو</title>
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .admin-card { background: #1a1a1a; border: 2px solid var(--gold); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #252525; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { margin-top: 15px; padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2 style="color:var(--gold)">👑 إدارة المحتوى</h2>
    <input type="password" id="pass" placeholder="كلمة السر">
    <input type="text" id="title" placeholder="اسم الكورس">
    <textarea id="desc" placeholder="وصف الكورس"></textarea>
    <input type="text" id="url" placeholder="رابط التحميل">
    <button onclick="uploadData()">🚀 نشر الآن</button>
    <div id="status"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAnjhujvWjLe9Z2KsIm-82rRB-00oGiIRw",
        authDomain: "mego-vip-site.firebaseapp.com",
        projectId: "mego-vip-site",
        databaseURL: "https://mego-vip-site-default-rtdb.firebaseio.com/"
    };

    // تشغيل فايربيس
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    function uploadData() {
        const pass = document.getElementById('pass').value;
        const title = document.getElementById('title').value;
        const desc = document.getElementById('desc').value;
        const url = document.getElementById('url').value;
        const status = document.getElementById('status');

        status.style.display = "block";

        if(pass !== "mego2026") {
            status.innerText = "❌ كلمة السر غلط!";
            status.style.background = "red";
            return;
        }

        if(title && desc && url) {
            status.innerText = "⏳ جاري الرفع...";
            status.style.background = "orange";

            // إرسال البيانات
            db.ref('courses').push({
                title: title,
                desc: desc,
                url: url
            }).then(() => {
                status.innerText = "✅ مبروك! تم النشر بنجاح";
                status.style.background = "green";
                document.getElementById('title').value = '';
                document.getElementById('desc').value = '';
                document.getElementById('url').value = '';
            }).catch(err => {
                status.innerText = "❌ خطأ: " + err.message;
                status.style.background = "red";
                console.error(err);
            });
        } else {
            status.innerText = "⚠️ كمل الخانات!";
            status.style.background = "yellow";
            status.style.color = "black";
        }
    }
</script>
</body>
</html>
